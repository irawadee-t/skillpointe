# Local Redis for SkillPointe Match development.
# Supabase is run separately via `supabase start` (Supabase CLI).
#
# Usage:
#   docker compose -f infra/docker-compose.local.yml up -d
#   docker compose -f infra/docker-compose.local.yml down

services:
  redis:
    image: redis:7-alpine
    container_name: skillpointe_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
